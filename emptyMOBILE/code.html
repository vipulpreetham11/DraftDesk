<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAF8F5; /* neutral-50 Brand Base */
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-margin-page h-16 w-full bg-surface dark:bg-surface fixed top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="edit_note" style="font-size: 28px;">edit_note</span>
<h1 class="text-headline-md font-headline-md text-primary dark:text-inverse-primary tracking-tight">DraftDesk</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined p-2 rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-100" data-icon="notifications">notifications</button>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-label-md text-label-md">
                JS
            </div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-page pt-16 pb-24">
<div class="max-w-md w-full flex flex-col items-center text-center space-y-stack-lg">
<!-- Illustration Container -->
<div class="relative group">
<div class="absolute -inset-4 bg-primary-container/10 rounded-full blur-2xl group-hover:bg-primary-container/20 transition-all duration-700"></div>
<img alt="" class="relative w-64 h-64 object-contain animate-float" src="https://lh3.googleusercontent.com/aida/ADBb0uju9136odU1e_d0pYKfn-i1sqlmrsMYr_h4AzZF6r8UZzY7m7Y0A0Ken-raYk2LVmBweLDB5yg_29xN-hJ0D0DvU-jYzKZj9nyshDePZ1FikQzSxEquMx0-0_2ATdoi85QLCkfBwrX7efOwjYx2NvCYsJ69XQPURC4HmlIw4KqA-y_jPRUlwz1ba1k8oT1fzm4sGwk5ANebL7ue1zv8Xx-MnUmVs7PawRKHnHB2jEcFsjCIp6aATSVtStNJ" style="animation: float 6s ease-in-out infinite;"/>
</div>
<!-- Empty State Typography -->
<div class="space-y-stack-sm">
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">No scripts yet.</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant max-w-[280px] mx-auto">Let's create your first one.</p>
</div>
<!-- Action Button -->
<button class="bg-primary-container hover:bg-primary-dark text-on-primary font-bold py-4 px-8 rounded-[10px] flex items-center gap-3 shadow-md hover:shadow-lg active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="text-label-md font-label-md tracking-wider">Create your first script</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container dark:bg-inverse-surface shadow-[0_-1px_3px_rgba(45,42,38,0.05)] rounded-t-xl">
<!-- Planner (Active) -->
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-xl px-4 py-1 hover:bg-surface-container-high dark:hover:bg-neutral-600 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="text-label-sm font-label-sm mt-1">Planner</span>
</a>
<!-- Assets -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant dark:text-secondary-fixed-dim px-4 py-1 hover:bg-surface-container-high dark:hover:bg-neutral-600 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
<span class="text-label-sm font-label-sm mt-1">Assets</span>
</a>
<!-- Ideas -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant dark:text-secondary-fixed-dim px-4 py-1 hover:bg-surface-container-high dark:hover:bg-neutral-600 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="lightbulb">lightbulb</span>
<span class="text-label-sm font-label-sm mt-1">Ideas</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant dark:text-secondary-fixed-dim px-4 py-1 hover:bg-surface-container-high dark:hover:bg-neutral-600 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-label-sm font-label-sm mt-1">Settings</span>
</a>
</nav>
<style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        /* Safe Area Padding for mobile browsers */
        .pb-safe {
            padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
        }
    </style>
<script>
        // Micro-interaction for buttons
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('touchstart', () => {
                elem.style.transform = 'scale(0.96)';
            });
            elem.addEventListener('touchend', () => {
                elem.style.transform = 'scale(1)';
            });
        });

        // Mock Navigation State Management
        const navItems = document.querySelectorAll('nav a');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                navItems.forEach(i => {
                    i.className = "flex flex-col items-center justify-center text-on-secondary-fixed-variant dark:text-secondary-fixed-dim px-4 py-1 hover:bg-surface-container-high dark:hover:bg-neutral-600 transition-all active:scale-90 duration-200";
                });
                item.className = "flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-xl px-4 py-1 hover:bg-surface-container-high dark:hover:bg-neutral-600 transition-all active:scale-90 duration-200";
            });
        });
    </script>
</body></html>
