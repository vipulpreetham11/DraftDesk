<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DraftDesk - Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&amp;family=Source+Sans+3:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAF8F5; /* neutral-50 */
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "secondary-fixed": "#e8e1db",
                      "primary-fixed": "#ffdbd0",
                      "on-tertiary": "#ffffff",
                      "primary-dark": "#C45A32",
                      "surface-dim": "#ead6d0",
                      "on-background": "#241916",
                      "on-primary-fixed-variant": "#822803",
                      "primary": "#a23f1a",
                      "on-surface-variant": "#57423b",
                      "neutral-100": "#F3F0EB",
                      "tertiary-fixed-dim": "#5cd8dd",
                      "on-secondary": "#ffffff",
                      "neutral-200": "#E8E4DE",
                      "on-primary-fixed": "#390c00",
                      "error-container": "#ffdad6",
                      "on-secondary-container": "#66625d",
                      "amber-light": "#FCE8B8",
                      "outline-variant": "#dec0b7",
                      "inverse-primary": "#ffb59d",
                      "outline": "#8a726a",
                      "tertiary": "#00696d",
                      "primary-light": "#F4A98B",
                      "on-tertiary-fixed": "#002021",
                      "inverse-on-surface": "#ffede8",
                      "on-tertiary-fixed-variant": "#004f52",
                      "tertiary-container": "#00a5aa",
                      "surface-bright": "#fff8f6",
                      "charcoal-light": "#4A4540",
                      "surface-container": "#fee9e3",
                      "surface-variant": "#f3ded8",
                      "surface-container-high": "#f9e4de",
                      "surface": "#fff8f6",
                      "on-error": "#ffffff",
                      "neutral-300": "#C9C4BC",
                      "on-tertiary-container": "#003335",
                      "inverse-surface": "#3a2e2a",
                      "background": "#fff8f6",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-low": "#fff1ed",
                      "amber": "#F5C563",
                      "secondary-container": "#e5ded8",
                      "tertiary-fixed": "#7bf5fa",
                      "primary-container": "#e8734a",
                      "neutral-50": "#FAF8F5",
                      "on-secondary-fixed-variant": "#4a4642",
                      "on-error-container": "#93000a",
                      "neutral-600": "#5C5750",
                      "primary-fixed-dim": "#ffb59d",
                      "surface-tint": "#a23f1a",
                      "surface-container-highest": "#f3ded8",
                      "secondary": "#625e59",
                      "on-primary-container": "#581700",
                      "error": "#ba1a1a",
                      "on-surface": "#241916",
                      "on-secondary-fixed": "#1e1b17",
                      "secondary-fixed-dim": "#ccc5bf",
                      "on-primary": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-md": "1rem",
                      "stack-sm": "0.5rem",
                      "stack-lg": "2rem",
                      "margin-page": "2rem",
                      "gutter": "1.5rem"
              },
              "fontFamily": {
                      "label-md": ["Source Sans 3"],
                      "headline-md": ["Outfit"],
                      "headline-sm": ["Outfit"],

                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                      "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],

          },

</head>
<body class="bg-neutral-50 text-on-surface">
<!-- SideNavBar (Anchor) -->
<aside class="h-screen w-64 fixed left-0 top-0 bg-neutral-100 dark:bg-neutral-600 shadow-sm flex flex-col p-stack-md border-r border-neutral-200 dark:border-neutral-500 z-50">
<div class="mb-stack-lg">
<h1 class="font-headline-sm text-headline-sm font-bold text-primary dark:text-primary-light">DraftDesk</h1>
<p class="font-body-sm text-body-sm text-secondary">Content Planner</p>
</div>
<nav class="flex-grow space-y-2">
<!-- Dashboard Active -->
<a class="flex items-center gap-3 px-4 py-3 text-primary dark:text-primary-light font-bold bg-secondary-container dark:bg-secondary-fixed-dim/20 rounded-lg active:scale-95 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-md text-label-md">Dashboard</span>
</a>
<!-- Settings Disabled (Inactive style, simulated disabled interaction) -->
<div class="flex items-center gap-3 px-4 py-3 text-secondary dark:text-secondary-fixed-dim opacity-50 cursor-not-allowed">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Settings</span>
</div>
</nav>
<div class="mt-auto">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-white py-3 rounded-[10px] font-label-md text-label-md hover:bg-primary-dark transition-colors shadow-sm">
<span class="material-symbols-outlined">add</span>
                New Project
            </button>
</div>
</aside>
<!-- Main Content Area -->
<main class="ml-64 min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full sticky top-0 bg-background dark:bg-background z-40">
<div class="flex justify-between items-center px-margin-page py-stack-md max-w-7xl mx-auto">
<h2 class="font-headline-md text-headline-md font-bold text-primary">Your content</h2>
<div class="flex items-center gap-4">
<button class="flex items-center gap-2 bg-primary text-white px-6 py-2.5 rounded-[10px] font-label-md text-label-md hover:bg-primary-dark transition-all shadow-sm">
<span class="material-symbols-outlined">edit_note</span>
                        New script
                    </button>
</div>
</div>
</header>
<!-- Empty State Canvas -->
<section class="flex-grow flex items-center justify-center px-margin-page py-stack-lg">
<div class="max-w-md w-full text-center flex flex-col items-center">
<!-- Illustration -->
<div class="relative w-full aspect-square mb-stack-lg max-w-[320px]">
<img alt="Empty state illustration" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uju9136odU1e_d0pYKfn-i1sqlmrsMYr_h4AzZF6r8UZzY7m7Y0A0Ken-raYk2LVmBweLDB5yg_29xN-hJ0D0DvU-jYzKZj9nyshDePZ1FikQzSxEquMx0-0_2ATdoi85QLCkfBwrX7efOwjYx2NvCYsJ69XQPURC4HmlIw4KqA-y_jPRUlwz1ba1k8oT1fzm4sGwk5ANebL7ue1zv8Xx-MnUmVs7PawRKHnHB2jEcFsjCIp6aATSVtStNJ"/>
<!-- Atmospheric Effect -->
<div class="absolute -z-10 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-primary-fixed opacity-20 blur-[80px] rounded-full"></div>
</div>
<!-- Messaging -->
<h3 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm">No scripts yet.</h3>
<p class="font-body-lg text-body-lg text-secondary mb-stack-lg">Let's create your first one.</p>
<!-- CTA -->
<button class="group flex items-center gap-3 bg-primary text-white px-8 py-4 rounded-[10px] font-label-md text-label-md hover:bg-primary-dark transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-primary/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
                    Create your first script
                </button>
<!-- Secondary Micro-hint -->
<div class="mt-stack-lg pt-stack-md border-t border-neutral-200 w-full opacity-60">
<p class="font-body-sm text-body-sm text-secondary italic">Drafting ideas, planning schedules, and organizing content starts here.</p>
</div>
</div>
</section>
</main>
<script>
        // Micro-interaction for hover states
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1)';
            });
        });

        // Simple fade-in animation for the illustration
        window.addEventListener('DOMContentLoaded', () => {
            const illustration = document.querySelector('img');
            illustration.style.opacity = '0';
            illustration.style.transform = 'translateY(20px)';
            illustration.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
            
            setTimeout(() => {
                illustration.style.opacity = '1';
                illustration.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
